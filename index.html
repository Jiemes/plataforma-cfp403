<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual CFP 403</title>
    <link rel="icon" type="image/png" href="assets/CFP 403.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=9.18.11">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/CFP 403.png" alt="CFP 403 Logo" class="main-logo">
                <h1>Centro de Formación Profesional N° 403</h1>
                <p class="subtitle">Mercedes (B)</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Usuario</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu número de documento" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <div style="text-align:center; margin-top:15px;">
                <a href="#" onclick="recuperarClave()" style="color:var(--primary-color); font-size:0.85rem; font-weight:700; text-decoration:none;">¿Olvidaste tu contraseña?</a>
            </div>

            <div class="login-footer">
                <img src="assets/Logo GBA.png" alt="Gobierno de la Provincia de Buenos Aires" class="gba-logo">
                <p>Fundado el 24 de enero de 2023</p>
            </div>
        </div>
    </div>

    <!-- ALERT MODAL PERSONALIZADO -->
    <div id="cfp-alert" class="alert-modal-overlay">
        <div class="alert-modal-content">
            <img src="assets/CFP 403.png" alt="CFP Logo" class="alert-logo">
            <div id="alert-title" class="alert-title">ATENCIÓN</div>
            <div id="alert-message" class="alert-message">Mensaje del sistema</div>
            <button class="btn-alert-confirm" onclick="closeCfpAlert()">ENTENDIDO</button>
        </div>
    </div>

    <script src="js/firebase-config.js?v=9.18.28"></script>
    <script src="js/app.js?v=9.18.28"></script>
</body>

</html>
