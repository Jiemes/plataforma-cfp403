<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual CFP 403 v9.12.0</title>
    <link rel="icon" type="image/png" href="assets/CFP 403.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=9.12.0">
    <link rel="stylesheet" href="css/student.css?v=9.12.0">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
</head>

<body>
    <!-- HEADER UNIFICADO (Fijo en todas las vistas) -->
    <header class="home-header-professional">
        <div class="header-content-unified">
            <img src="assets/CFP 403.png" alt="Logo CFP" class="header-logo-side">
            <div class="header-center-info">
                <h1 id="home-student-name">¡Hola, Alumno!</h1>
                <p>Bienvenido a tu plataforma educativa del CFP 403 Mercedes.</p>
            </div>
            <div class="header-right-container">
                <img src="assets/Logo GBA Vertical.png" alt="Logo GBA" class="header-logo-side">
                <div class="header-actions">
                    <button id="btn-header-action" class="btn-action-header">Cerrar Sesión</button>
                    <!-- El texto y función de este botón cambiarán dinámicamente -->
                </div>
            </div>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="main-container-unified">

        <!-- 1. PANTALLA DE INICIO (Selector de Cursos) -->
        <div id="home-view" class="home-container animated-in">
            <main class="home-main">
                <div class="section-title">
                    <span class="dot"></span>
                    <h2>Mis Cursos</h2>
                </div>
                <div id="home-course-grid" class="course-grid">
                    <div class="loader">Sincronizando información...</div>
                </div>
            </main>
        </div>

        <!-- 2. VISTA DASHBOARD DEL CURSO -->
        <div id="course-view" class="student-layout hidden">
            <!-- Banner del Curso -->
            <div class="course-banner-blue">
                <div class="banner-content">
                    <h1 id="course-title">Curso</h1>
                    <div id="course-stats-summary" class="course-stats-container">
                        <!-- Carga dinámica: Promedio y Progreso -->
                    </div>
                    <button class="btn-foro-banner" onclick="openForo()">💬 MURO DE CONSULTAS</button>
                </div>
            </div>

            <div class="course-body-container">
                <!-- Listado de Contenidos -->
                <div id="weeks-container-wrapper" class="weeks-container-wrapper">
                    <div class="week-list" id="weeks-container">
                        <div class="loading-spinner">Cargando material...</div>
                    </div>
                </div>

                <!-- Visor de PDF -->
                <main class="main-viewer" id="main-viewer">
                    <div id="viewer-container" class="viewer-container hidden">
                        <div class="viewer-wrapper">
                            <div id="pdf-loader" class="viewer-loader">
                                <div class="loader-card">
                                    <h3>⌛ Cargando archivo...</h3>
                                    <p>Estamos preparando tu material de lectura.</p>
                                    <a id="pdf-retry-btn" href="#" target="_blank" class="btn-retry">¿No carga? Abrir en
                                        pestaña nueva</a>
                                </div>
                            </div>
                            <iframe id="pdf-viewer" src="" frameborder="0"></iframe>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- MODAL FORO / MURO DE CONSULTAS -->
    <div id="foro-modal" class="modal hidden">
        <div class="modal-content"
            style="max-width:800px; height:80vh; display:flex; flex-direction:column; padding:30px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-weight:900; color:var(--primary-color);">Muro de Consultas</h2>
                <button class="btn-icon" onclick="closeForo()" style="font-size:1.2rem;">✖️</button>
            </div>

            <div id="foro-student-container" class="foro-wrapper"
                style="flex-grow:1; overflow-y:auto; padding-right:15px; text-align:left;">
                <!-- Mensajes -->
            </div>

            <div class="foro-input-area" style="margin-top:20px; border-top:1px solid #e2e8f0; padding-top:20px;">
                <div id="reply-preview-student" class="reply-preview-box hidden"
                    style="background:#f1f5f9; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <small style="color:#64748b;">🔄 Respondiendo a: <strong
                            id="reply-to-name-student"></strong></small>
                    <button onclick="cancelReplyStudent()" class="btn-icon" style="font-size:0.8rem;">✖️</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <textarea id="foro-input-student" class="input-premium-task"
                        style="width:100%; height:60px; resize:none;"
                        placeholder="Escribe tu consulta o comentario..."></textarea>
                    <button class="btn-submit-task" id="btn-send-foro" onclick="sendMessageStudent()"
                        style="width:120px;">ENVIAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/student.js?v=9.11.0"></script>
</body>

</html>
